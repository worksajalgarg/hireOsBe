# Local development only — no real AWS resources. Matches the reference
# architecture's data layer (PostgreSQL+pgvector, Redis, object storage)
# without provisioning cloud infrastructure (deferred per Sprint 1 decision).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 -> container 6379; host already runs a native redis-server on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: platform123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  sqs:
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - "9324:9324"

volumes:
  postgres-data:
  minio-data:
